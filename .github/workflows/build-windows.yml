name: Build Windows

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Package release archive
        shell: pwsh
        run: |
          $pkg = "desktop-neko-windows-x64"
          New-Item -ItemType Directory -Path $pkg | Out-Null
          Copy-Item "target\x86_64-pc-windows-msvc\release\desktop-neko.exe" $pkg\
          Copy-Item -Recurse "packages" "$pkg\packages"
          Compress-Archive -Path "$pkg\*" -DestinationPath "$pkg.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-neko-windows-x64
          path: desktop-neko-windows-x64.zip

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: desktop-neko-windows-x64.zip
