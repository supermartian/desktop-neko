[behavior]
initial_state = "idle"
tick_rate_ms = 100

[[states]]
name = "idle"
animation = "idle"
[[states.transitions]]
condition = { type = "falling" }
target = "fall"
priority = 90
[[states.transitions]]
condition = { type = "on_click", button = "left", count = 3 }
target = "annoyed"
priority = 10
[[states.transitions]]
condition = { type = "timer", min_seconds = 5.0, max_seconds = 10.0 }
targets = [
    { state = "walk_right", weight = 0.6 },
    { state = "walk_left", weight = 0.6 },
    { state = "sleep", weight = 0.8 },
    { state = "happy", weight = 0.5 }
]

[[states]]
name = "walk_right"
